# publish.yaml — manifest for Scripts/publish_to_wiki.py
#
# Bump `revision` (and `revision_date` if you want to override today) when
# cutting a new locked version, then run:
#   python Scripts/publish_to_wiki.py            # update wiki working copy
#   python Scripts/publish_to_wiki.py --pdf      # also render PDFs to releases/Rev<rev>/
#
# The wiki repository is expected to be checked out next to this repo at
# ../APPN-Field-Protocols-and-Pipelines.wiki (override with --wiki-path).
#
# Per-page `status:` is a list of completed Field EWG review stages. Recognised
# stage IDs (in order):
#   drafted        — content is complete enough to circulate
#   ewg_feedback   — sent to the Field EWG; feedback received
#   modified       — feedback addressed in the working draft
#   approved       — Experts from Field EWG has signed off the modified draft
#   adopted        — published as a locked revision and live on the wiki
# Add stage IDs to the list as each stage is completed. Optional `notes:` is a
# free-text field shown in the tracker table.
#
# Per-page `last_revised:` records the revision in which that document last
# changed (written in the same MAJOR.YYx form as `revision`). Defaults to the
# current `revision` if omitted. Bump a page's `last_revised` to the current
# revision in the same release that changes its content.
#
# `revision` is the version of the whole protocol suite, written `MAJOR.YYx`
# (see the "Versioning" section of the repo README):
#   MAJOR  number; annual baseline, locked at the start of the season
#   YY     number; minor, two digits with leading zero — in-season change to
#          what you do or new scope (stub finished, new page, APEx-confirmed
#          parameter, procedure correction)
#   x      letter patch suffix; editorial-only change (typo, clarification,
#          photo) — no procedure change. No letter means no patch.

revision: "1.00"
# revision_date: "2026-04-25"   # uncomment to pin; defaults to today (UTC)

repo_url: "https://github.com/aus-plant-phenomics-network/APPN-Field-Protocols-and-Pipelines"
default_branch: "main"

# Extra entries appended to the sidebar's "External" section, after the main
# repository link. Each entry needs `label:` and `url:`.
external_links:
  - label: "Gryfn Gitbook"
    url: "https://gryfn.gitbook.io/"

# Sensor fieldbook nav strip injected at the top of every published wiki page
# (just under the locked-revision/status banner). Each entry references an
# existing wiki_page; rendered as a centred row of shields.io badges.
# Set `nav_badges: []` to disable.
nav_badges:
  - wiki_page: CALViS-Fieldbook
    label: "CALViS"
    color: "6f901e"
  - wiki_page: GOBI-M350-Fieldbook
    label: "GOBI (M350)"
    color: "6f901e"
  - wiki_page: GOBI-IF1200-Fieldbook
    label: "GOBI (IF1200)"
    color: "6f901e"
  - wiki_page: HiRes-Fieldbook
    label: "HiRes"
    color: "6f901e"
  - wiki_page: M3M-Fieldbook
    label: "M3M"
    color: "6f901e"

